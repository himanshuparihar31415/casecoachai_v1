[build]
builder = "nixpacks"
buildCommand = "npm install"

[deploy]
startCommand = "node --experimental-specifier-resolution=node --loader ts-node/esm server.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[env]
NODE_ENV = "production"
